<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Calculadora de Anúncios</title>

<style>
/* Reset e estilos base */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body{
  font-family: 'Arial', sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding: 20px;
}

/* Container centralizado */
.container{
  background:#1e293b;
  padding:25px 20px;
  border-radius:15px;
  width:100%;
  max-width:400px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* Título */
h2{
  text-align:center;
  margin-bottom:25px;
  font-size:1.6rem;
}

/* Labels e inputs */
label{
  display:block;
  font-size:14px;
  margin-bottom:5px;
}

input[type=range], input[type=number]{
  width:100%;
  margin-bottom:15px;
  padding:8px;
  border-radius:8px;
  border:none;
  background:#334155;
  color:white;
  font-size:1rem;
}

input[type=number]:focus{
  outline:none;
  box-shadow:0 0 8px #22c55e;
}

span{
  font-size:0.9rem;
  display:block;
  margin-bottom:10px;
}

/* Resultados */
.result{
  background:#020617;
  padding:15px;
  border-radius:12px;
  margin-top:20px;
  box-shadow: inset 0 0 10px rgba(34,197,94,0.2);
}

.result p{
  margin:8px 0;
  font-size:1rem;
}

.value{
  color:#22c55e;
  font-weight:bold;
  font-size:1.1rem;
}

/* Responsivo mobile vertical */
@media (max-width: 450px){
  .container{
    padding:20px 15px;
  }

  h2{
    font-size:1.4rem;
  }

  input[type=range], input[type=number]{
    font-size:0.95rem;
  }

  .value{
    font-size:1rem;
  }
}
</style>
</head>

<body>

<div class="container">

<h2>Simulador de Anúncios</h2>

<label>Investimento (USD)</label>
<input type="range" min="5" max="1000" step="5" value="30" id="invest">
<input type="number" id="investInput" min="5" max="1000" step="1" value="30">
<span id="usdValue">30 USD</span>

<label>Câmbio do Dia (MZN por USD)</label>
<input type="number" id="cambioInput" value="63.9" step="0.01">

<label>Percentagem de Gestão</label>
<input type="range" min="5" max="30" step="1" value="20" id="percent">
<input type="number" id="percentInput" min="5" max="30" step="1" value="20">
<span id="percentValue">20%</span>

<div class="result">

<p>Investimento em MZN:
<span class="value" id="mzn"></span></p>

<p>Gestão:
<span class="value" id="gestao"></span></p>

<p>Total a pagar:
<span class="value" id="total"></span></p>

</div>

</div>

<script>
const invest = document.getElementById("invest");
const investInput = document.getElementById("investInput");
const percent = document.getElementById("percent");
const percentInput = document.getElementById("percentInput");
const cambioInput = document.getElementById("cambioInput");

function calcular(){
    let usd = parseFloat(investInput.value);
    let perc = parseFloat(percentInput.value);
    let cambio = parseFloat(cambioInput.value);

    let mzn = usd * cambio;
    let gestao = mzn * (perc/100);
    let total = mzn + gestao;

    document.getElementById("usdValue").innerText = usd + " USD";
    document.getElementById("percentValue").innerText = perc + "%";
    document.getElementById("mzn").innerText = mzn.toFixed(2) + " MZN";
    document.getElementById("gestao").innerText = gestao.toFixed(2) + " MZN";
    document.getElementById("total").innerText = total.toFixed(2) + " MZN";
}

// Sincronizar inputs de range e número
invest.oninput = () => { investInput.value = invest.value; calcular(); };
investInput.oninput = () => { invest.value = investInput.value; calcular(); };

percent.oninput = () => { percentInput.value = percent.value; calcular(); };
percentInput.oninput = () => { percent.value = percentInput.value; calcular(); };

cambioInput.oninput = calcular;

// Inicializar
calcular();
</script>

</body>
</html>
